<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A lightweight dashboard for OpenSandbox">
    <script>
      (function () {
        var sidebar = localStorage.getItem('opensandbox-sidebar');
        if (sidebar) { document.documentElement.setAttribute('data-sidebar', sidebar); }
        var savedTheme = localStorage.getItem('opensandbox-theme');
        var preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dim' : 'corporate';
        document.documentElement.setAttribute('data-theme', savedTheme || preferredTheme);
        window.osbLiveUpdatesEnabled = localStorage.getItem('opensandbox-live-updates') !== 'paused';
        window.osbSandboxFilter = localStorage.getItem('opensandbox-state-filter') || 'all';
      })();
    </script>
    <title>OpenSandbox Dashboard</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/basecoat.cdn.min.css">
    <link rel="stylesheet" href="/assets/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.10" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="workspace">
          <button class="workspace-mark" id="workspace-mark" type="button" aria-label="OpenSandbox home">
            OS
            <span class="workspace-mark-expand" aria-hidden="true"><i data-lucide="panel-left-open"></i></span>
          </button>
          <span class="workspace-name">OpenSandbox</span>
          <span class="workspace-actions">
            <button class="sidebar-button" type="button" aria-label="Search" title="Search" disabled>
              <i data-lucide="search"></i>
            </button>
            <button class="sidebar-toggle sidebar-button" id="sidebar-toggle" type="button" aria-label="Collapse sidebar">
              <span class="icon-collapse"><i data-lucide="panel-left-close"></i></span>
              <span class="icon-expand"><i data-lucide="panel-left-open"></i></span>
            </button>
          </span>
        </div>

        <nav class="sidebar-nav" aria-label="Primary navigation">
          <a class="nav-item" href="/" aria-current="page">
            <span class="nav-item-icon"><i data-lucide="boxes"></i></span>
            <span class="nav-item-label">Sandboxes</span>
            <span id="sandbox-nav-count" class="nav-item-count">0</span>
          </a>
          <span class="nav-item" aria-disabled="true">
            <span class="nav-item-icon"><i data-lucide="layers-3"></i></span>
            <span class="nav-item-label">Snapshots</span>
            <span class="nav-item-count">0</span>
          </span>
          <span class="nav-item" aria-disabled="true">
            <span class="nav-item-icon"><i data-lucide="activity"></i></span>
            <span class="nav-item-label">Activity</span>
          </span>
          <div class="nav-menu">
            <button id="settings-menu-toggle" class="nav-item" type="button" aria-haspopup="menu" aria-expanded="false" aria-controls="settings-submenu">
              <span class="nav-item-icon"><i data-lucide="settings"></i></span>
              <span class="nav-item-label">Settings</span>
              <span class="nav-menu-chevron" aria-hidden="true"><i data-lucide="chevron-right"></i></span>
            </button>
            <div id="settings-submenu" class="nav-submenu" role="menu" aria-label="Settings">
              <button id="theme-switch" class="nav-subitem" type="button" role="switch" aria-checked="false" aria-label="Toggle dark mode" title="Toggle dark mode">
                <span class="nav-item-icon"><i data-lucide="moon"></i></span>
                <span class="theme-switch-track" aria-hidden="true"><span></span></span>
                <span class="nav-item-icon"><i data-lucide="sun"></i></span>
              </button>
            </div>
          </div>
        </nav>
      </aside>

      <div class="main-frame">
        <section class="content-panel">
          <header class="topbar">
            <div class="topbar-breadcrumb">
              <span class="topbar-breadcrumb-current">Sandboxes</span>
            </div>
            <div class="toolbar">
              <button
                id="deploy-sandbox-button"
                class="icon-button sandbox-create-control"
                type="button"
                aria-label="Deploy a new sandbox"
                title="Deploy a new sandbox"
                data-open-create-modal
              >
                <i data-lucide="plus"></i>
              </button>
              <button id="live-updates-toggle" class="icon-button" data-live-state="enabled" type="button" aria-label="Live updates on" title="Live updates on">
                <i data-lucide="refresh-cw"></i>
              </button>
            </div>
          </header>

          <main>
            <section
              id="overview"
              hx-get="/dashboard/overview"
              hx-trigger="load, every 5s [document.visibilityState === 'visible' && window.osbLiveUpdatesEnabled !== false]"
              hx-swap="innerHTML"
              aria-live="polite"
            >
              <div class="filter-tabs" aria-label="Loading sandbox filters">
                <span class="filter-pill skeleton-pill"></span>
                <span class="filter-pill skeleton-pill"></span>
                <span class="filter-pill skeleton-pill"></span>
                <span class="filter-pill skeleton-pill"></span>
              </div>
              <section class="sandbox-group" aria-label="Loading sandboxes">
                <div class="group-header skeleton-header"></div>
                <div class="sandbox-list">
                  <div class="sandbox-row loading-row">
                    <span class="status-ring"></span>
                    <span class="skeleton-line"></span>
                    <span class="skeleton-line skeleton-line-short"></span>
                  </div>
                </div>
              </section>
            </section>
          </main>

          <noscript>
            <div class="noscript-notice">JavaScript is required for live dashboard updates.</div>
          </noscript>
        </section>
      </div>
    </div>

    <dialog id="create-sandbox-modal" class="app-modal" data-size="lg" aria-labelledby="create-sandbox-modal-title">
      <form
        id="create-sandbox-form"
        class="app-modal-surface"
        method="post"
        action="/dashboard/sandboxes"
        autocomplete="off"
        data-1p-ignore
        data-lpignore="true"
        data-form-type="other"
        hx-post="/dashboard/sandboxes"
        hx-target="#overview"
        hx-swap="innerHTML"
        hx-indicator="this"
        hx-disabled-elt="#create-sandbox-form input, #create-sandbox-form button"
      >
        <header class="app-modal-header">
          <span class="app-modal-icon" aria-hidden="true"><i data-lucide="box"></i></span>
          <div>
            <h2 id="create-sandbox-modal-title">Create sandbox</h2>
          </div>
          <button class="app-modal-close" type="button" data-create-modal-close aria-label="Close create sandbox form">
            <i data-lucide="x"></i>
          </button>
        </header>
        <div class="app-modal-body">
          <div id="create-sandbox-error" class="app-form-error" role="alert" hidden></div>
          <div class="app-form-field">
            <label for="sandbox-image">Container image</label>
            <span class="preset-input-control">
              <input id="sandbox-image" name="image" type="text" value="{{.SandboxImage}}" required autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" data-1p-ignore data-lpignore="true">
              <button id="image-presets-toggle" class="preset-menu-toggle" type="button" aria-haspopup="menu" aria-expanded="false" aria-controls="image-presets-menu" aria-label="Choose a preset image" title="Choose a preset image">
                <i data-lucide="disc"></i>
              </button>
              <span id="image-presets-menu" class="preset-menu" role="menu" aria-label="Preset container images" hidden>
                <button type="button" role="menuitem" data-preset-value="python:3.12-slim">
                  <span>Python</span><code>python:3.12-slim</code>
                </button>
                <button type="button" role="menuitem" data-preset-value="node:22-slim">
                  <span>Node.js</span><code>node:22-slim</code>
                </button>
                <button type="button" role="menuitem" data-preset-value="ubuntu:24.04">
                  <span>Ubuntu</span><code>ubuntu:24.04</code>
                </button>
                <button type="button" role="menuitem" data-preset-value="alpine:3.20">
                  <span>Alpine</span><code>alpine:3.20</code>
                </button>
              </span>
            </span>
          </div>
          <div class="app-form-field">
            <label for="resource-preset-label">Resources</label>
            <span class="preset-input-control">
              <input id="resource-preset-label" type="text" value="1 core / 2 GiB" readonly tabindex="-1" autocomplete="off" data-1p-ignore data-lpignore="true">
              <input name="resourcePreset" type="hidden" value="1core-2gib">
              <button id="resource-presets-toggle" class="preset-menu-toggle" type="button" aria-haspopup="menu" aria-expanded="false" aria-controls="resource-presets-menu" aria-label="Choose a resource preset" title="Choose a resource preset">
                <i data-lucide="cpu"></i>
              </button>
              <span id="resource-presets-menu" class="preset-menu" role="menu" aria-label="Resource presets" hidden>
                <button type="button" role="menuitem" data-preset-value="1core-2gib" data-preset-label="1 core / 2 GiB">
                  <span>1 core</span><code>2 GiB memory</code>
                </button>
                <button type="button" role="menuitem" data-preset-value="2core-4gib" data-preset-label="2 cores / 4 GiB">
                  <span>2 cores</span><code>4 GiB memory</code>
                </button>
                <button type="button" role="menuitem" data-preset-value="4core-8gib" data-preset-label="4 cores / 8 GiB">
                  <span>4 cores</span><code>8 GiB memory</code>
                </button>
                <button type="button" role="menuitem" data-preset-value="8core-16gib" data-preset-label="8 cores / 16 GiB">
                  <span>8 cores</span><code>16 GiB memory</code>
                </button>
              </span>
            </span>
          </div>
        </div>
        <footer class="app-modal-footer">
          <button class="app-modal-button" data-variant="secondary" type="button" data-create-modal-close>Cancel</button>
          <button class="app-modal-button create-submit-button" data-variant="primary" type="submit">
            <span class="create-button-label">Create</span>
            <span class="create-button-loading" aria-hidden="true"><i data-lucide="loader-circle"></i>Creating</span>
          </button>
        </footer>
      </form>
    </dialog>

    <dialog id="confirmation-modal" class="app-modal" aria-labelledby="confirmation-modal-title" aria-describedby="confirmation-modal-message">
      <form class="app-modal-surface" method="dialog">
        <header class="app-modal-header">
          <span class="app-modal-icon" data-variant="danger" aria-hidden="true"><i data-lucide="circle-alert"></i></span>
          <div>
            <h2 id="confirmation-modal-title">Confirm action</h2>
            <p id="confirmation-modal-message"></p>
          </div>
          <button class="app-modal-close" type="button" value="cancel" data-modal-close aria-label="Close confirmation">
            <i data-lucide="x"></i>
          </button>
        </header>
        <footer class="app-modal-footer">
          <button class="app-modal-button" data-variant="secondary" type="button" value="cancel" data-modal-close>Cancel</button>
          <button id="confirmation-modal-submit" class="app-modal-button" data-variant="danger" type="button" value="confirm" data-modal-close>Confirm</button>
        </footer>
      </form>
    </dialog>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        if (window.lucide) { lucide.createIcons(); }

        var root = document.documentElement;
        var liveUpdatesStorageKey = 'opensandbox-live-updates';
        var sandboxFilterStorageKey = 'opensandbox-state-filter';
        var themeStorageKey = 'opensandbox-theme';
        var themeSwitch = document.getElementById('theme-switch');
        var settingsMenuToggle = document.getElementById('settings-menu-toggle');
        var settingsMenu = settingsMenuToggle.closest('.nav-menu');
        var createSandboxModal = document.getElementById('create-sandbox-modal');
        var createSandboxForm = document.getElementById('create-sandbox-form');
        var createSandboxError = document.getElementById('create-sandbox-error');
        var imageInput = createSandboxForm.elements.image;
        var resourcePresetInput = createSandboxForm.elements.resourcePreset;
        var resourcePresetLabel = document.getElementById('resource-preset-label');
        var confirmationModal = document.getElementById('confirmation-modal');
        var confirmationTitle = document.getElementById('confirmation-modal-title');
        var confirmationMessage = document.getElementById('confirmation-modal-message');
        var confirmationSubmit = document.getElementById('confirmation-modal-submit');

        function applyTheme(theme, persist) {
          var selectedTheme = theme === 'dim' ? 'dim' : 'corporate';
          root.setAttribute('data-theme', selectedTheme);
          if (persist) { localStorage.setItem(themeStorageKey, selectedTheme); }

          themeSwitch.setAttribute('aria-checked', selectedTheme === 'dim' ? 'true' : 'false');
        }

        themeSwitch.addEventListener('click', function () {
          applyTheme(root.getAttribute('data-theme') === 'dim' ? 'corporate' : 'dim', true);
        });

        var colorScheme = window.matchMedia('(prefers-color-scheme: dark)');
        colorScheme.addEventListener('change', function (event) {
          if (!localStorage.getItem(themeStorageKey)) {
            applyTheme(event.matches ? 'dim' : 'corporate', false);
          }
        });
        applyTheme(root.getAttribute('data-theme'), false);

        function dismissModal(modal, returnValue) {
          if (!modal.open || modal.classList.contains('is-closing')) { return; }
          modal.returnValue = returnValue || 'cancel';
          modal.classList.add('is-closing');

          var closeTimer;
          function finishClose() {
            modal.removeEventListener('animationend', handleAnimationEnd);
            clearTimeout(closeTimer);
            modal.classList.remove('is-closing');
            if (modal.open) { modal.close(modal.returnValue); }
          }
          function handleAnimationEnd(event) {
            if (event.target === modal && event.animationName === 'modal-exit') { finishClose(); }
          }

          modal.addEventListener('animationend', handleAnimationEnd);
          closeTimer = setTimeout(finishClose, 180);
        }

        window.osbModal = {
          confirm: function (options) {
            confirmationTitle.textContent = options.title || 'Confirm action';
            confirmationMessage.textContent = options.message || 'Are you sure?';
            confirmationSubmit.textContent = options.confirmLabel || 'Confirm';
            confirmationSubmit.setAttribute('data-variant', options.variant || 'primary');
            confirmationModal.classList.remove('is-closing');
            confirmationModal.returnValue = '';
            confirmationModal.showModal();
            requestAnimationFrame(function () {
              confirmationModal.querySelector('.app-modal-footer [value="cancel"]').focus();
            });

            return new Promise(function (resolve) {
              confirmationModal.addEventListener('close', function () {
                resolve(confirmationModal.returnValue === 'confirm');
              }, { once: true });
            });
          },
          dismiss: function (returnValue) { dismissModal(confirmationModal, returnValue); }
        };

        confirmationModal.addEventListener('cancel', function (event) {
          event.preventDefault();
          dismissModal(confirmationModal, 'cancel');
        });

        confirmationModal.addEventListener('click', function (event) {
          var closeControl = event.target.closest('[data-modal-close]');
          if (closeControl) {
            dismissModal(confirmationModal, closeControl.value);
            return;
          }
          if (event.target === confirmationModal) { dismissModal(confirmationModal, 'cancel'); }
        });

        var presetMenus = [];

        function setupPresetMenu(toggleID, menuID, getValue, selectValue, focusTarget) {
          var toggle = document.getElementById(toggleID);
          var menu = document.getElementById(menuID);
          var control = toggle.closest('.preset-input-control');

          function setOpen(open, focusMenu) {
            toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
            menu.hidden = !open;
            menu.querySelectorAll('[data-preset-value]').forEach(function (option) {
              option.setAttribute('data-selected', option.dataset.presetValue === getValue() ? 'true' : 'false');
            });
            if (open && focusMenu) {
              requestAnimationFrame(function () {
                var selected = menu.querySelector('[data-selected="true"]');
                (selected || menu.querySelector('[data-preset-value]')).focus();
              });
            }
          }

          var controller = { close: function () { setOpen(false, false); } };
          presetMenus.push(controller);

          toggle.addEventListener('click', function () {
            var open = toggle.getAttribute('aria-expanded') !== 'true';
            presetMenus.forEach(function (presetMenu) { presetMenu.close(); });
            setOpen(open, true);
          });

          menu.addEventListener('click', function (event) {
            var option = event.target.closest('[data-preset-value]');
            if (!option) { return; }
            selectValue(option.dataset.presetValue, option.dataset.presetLabel || option.dataset.presetValue);
            setOpen(false, false);
            focusTarget.focus();
          });

          control.addEventListener('keydown', function (event) {
            if (event.key !== 'Escape' || menu.hidden) { return; }
            event.preventDefault();
            event.stopPropagation();
            setOpen(false, false);
            toggle.focus();
          });
        }

        setupPresetMenu(
          'image-presets-toggle',
          'image-presets-menu',
          function () { return imageInput.value; },
          function (value) { imageInput.value = value; },
          imageInput
        );
        setupPresetMenu(
          'resource-presets-toggle',
          'resource-presets-menu',
          function () { return resourcePresetInput.value; },
          function (value, label) {
            resourcePresetInput.value = value;
            resourcePresetLabel.value = label;
          },
          document.getElementById('resource-presets-toggle')
        );

        function closePresetMenus() {
          presetMenus.forEach(function (presetMenu) { presetMenu.close(); });
        }

        document.addEventListener('click', function (event) {
          if (!event.target.closest('.preset-input-control')) { closePresetMenus(); }
        });

        function openCreateSandboxModal() {
          createSandboxError.hidden = true;
          createSandboxError.textContent = '';
          createSandboxModal.classList.remove('is-closing');
          createSandboxModal.returnValue = '';
          closePresetMenus();
          createSandboxModal.showModal();
          requestAnimationFrame(function () {
            createSandboxForm.elements.image.focus();
          });
        }

        document.body.addEventListener('click', function (event) {
          if (event.target.closest('[data-open-create-modal]')) { openCreateSandboxModal(); }
        });

        createSandboxModal.addEventListener('cancel', function (event) {
          event.preventDefault();
          dismissModal(createSandboxModal, 'cancel');
        });

        createSandboxModal.addEventListener('click', function (event) {
          if (event.target.closest('[data-create-modal-close]') || event.target === createSandboxModal) {
            dismissModal(createSandboxModal, 'cancel');
          }
        });

        createSandboxModal.addEventListener('close', function () {
          createSandboxForm.reset();
          closePresetMenus();
          createSandboxError.hidden = true;
          createSandboxError.textContent = '';
        });

        createSandboxForm.addEventListener('htmx:beforeRequest', function () {
          createSandboxForm.setAttribute('aria-busy', 'true');
          createSandboxError.hidden = true;
          createSandboxError.textContent = '';
        });

        createSandboxForm.addEventListener('htmx:afterRequest', function () {
          createSandboxForm.setAttribute('aria-busy', 'false');
        });

        createSandboxForm.addEventListener('htmx:responseError', function (event) {
          createSandboxError.textContent = event.detail.xhr.responseText.trim() || 'Unable to create sandbox.';
          createSandboxError.hidden = false;
        });

        document.body.addEventListener('sandboxCreateAccepted', function () {
          dismissModal(createSandboxModal, 'accepted');
        });

        document.body.addEventListener('htmx:confirm', function (event) {
          if (!event.detail.question) { return; }
          event.preventDefault();
          var action = event.detail.elt;
          window.osbModal.confirm({
            title: action.dataset.confirmTitle,
            message: event.detail.question,
            confirmLabel: action.dataset.confirmLabel,
            variant: action.dataset.confirmVariant
          }).then(function (confirmed) {
            if (confirmed) { event.detail.issueRequest(true); }
          });
        });

        window.localizeSandboxTimes = function () {
          var absoluteFormatter = new Intl.DateTimeFormat(undefined, {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
            second: '2-digit',
            timeZoneName: 'short'
          });
          var relativeFormatter = new Intl.RelativeTimeFormat(undefined, { numeric: 'auto' });
          var now = Date.now();
          var relativeThreshold = 3 * 60 * 60 * 1000;

          document.querySelectorAll('time[data-created-time]').forEach(function (element) {
            var value = new Date(element.getAttribute('datetime'));
            if (Number.isNaN(value.getTime())) { return; }

            var difference = value.getTime() - now;
            if (Math.abs(difference) <= relativeThreshold) {
              var unit = 'second';
              var divisor = 1000;
              if (Math.abs(difference) >= 60 * 60 * 1000) {
                unit = 'hour';
                divisor = 60 * 60 * 1000;
              } else if (Math.abs(difference) >= 60 * 1000) {
                unit = 'minute';
                divisor = 60 * 1000;
              }
              element.textContent = 'created ' + relativeFormatter.format(Math.round(difference / divisor), unit);
            } else {
              element.textContent = 'created ' + absoluteFormatter.format(value);
            }
            element.title = value.toISOString();
          });
        };

        window.applySandboxFilter = function () {
          var pills = Array.from(document.querySelectorAll('[data-state-filter]'));
          if (!pills.length) { return; }

          var selected = window.osbSandboxFilter || 'all';
          if (!pills.some(function (pill) { return pill.dataset.stateFilter === selected; })) {
            selected = 'all';
            window.osbSandboxFilter = selected;
            localStorage.setItem(sandboxFilterStorageKey, selected);
          }

          pills.forEach(function (pill) {
            var active = pill.dataset.stateFilter === selected;
            pill.setAttribute('data-active', active ? 'true' : 'false');
            pill.setAttribute('aria-pressed', active ? 'true' : 'false');
          });

          var groups = Array.from(document.querySelectorAll('[data-sandbox-state]'));
          var visibleGroups = 0;
          groups.forEach(function (group) {
            var visible = selected === 'all' || group.dataset.sandboxState === selected;
            group.hidden = !visible;
            group.classList.toggle('is-filtered-view', visible && selected !== 'all');
            if (visible) { visibleGroups += 1; }
          });

          var filteredEmpty = document.querySelector('[data-filter-empty]');
          if (filteredEmpty) { filteredEmpty.hidden = visibleGroups !== 0; }
        };

        document.body.addEventListener('click', function (event) {
          var pill = event.target.closest('[data-state-filter]');
          if (!pill) { return; }
          window.osbSandboxFilter = pill.dataset.stateFilter;
          localStorage.setItem(sandboxFilterStorageKey, window.osbSandboxFilter);
          window.applySandboxFilter();
        });

        function liveUpdatesEnabled() {
          return window.osbLiveUpdatesEnabled !== false;
        }

        function updateLiveUpdatesToggle() {
          var toggle = document.getElementById('live-updates-toggle');
          if (!toggle) { return; }
          var enabled = liveUpdatesEnabled();
          toggle.setAttribute('data-live-state', enabled ? 'enabled' : 'paused');
          toggle.setAttribute('aria-label', enabled ? 'Live updates on' : 'Live updates off');
          toggle.setAttribute('title', enabled ? 'Live updates on' : 'Live updates off');
          toggle.innerHTML = '<i data-lucide="' + (enabled ? 'refresh-cw' : 'refresh-cw-off') + '"></i>';
          if (window.lucide) { lucide.createIcons(); }
        }

        var liveToggle = document.getElementById('live-updates-toggle');
        if (liveToggle) {
          liveToggle.addEventListener('click', function () {
            window.osbLiveUpdatesEnabled = !liveUpdatesEnabled();
            localStorage.setItem(liveUpdatesStorageKey, liveUpdatesEnabled() ? 'enabled' : 'paused');
            updateLiveUpdatesToggle();
          });
        }
        updateLiveUpdatesToggle();

        function sidebarCollapsed() {
          return root.getAttribute('data-sidebar') === 'collapsed';
        }

        function updateSidebarLabel() {
          var toggle = document.getElementById('sidebar-toggle');
          if (toggle) {
            toggle.setAttribute('aria-label', sidebarCollapsed() ? 'Expand sidebar' : 'Collapse sidebar');
          }
        }

        function setSettingsMenuState(open) {
          settingsMenuToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        }

        settingsMenu.addEventListener('mouseenter', function () { setSettingsMenuState(true); });
        settingsMenu.addEventListener('mouseleave', function () { setSettingsMenuState(false); });
        settingsMenu.addEventListener('focusin', function () { setSettingsMenuState(true); });
        settingsMenu.addEventListener('focusout', function () {
          requestAnimationFrame(function () {
            setSettingsMenuState(settingsMenu.contains(document.activeElement));
          });
        });
        settingsMenu.addEventListener('keydown', function (event) {
          if (event.key !== 'Escape') { return; }
          settingsMenuToggle.focus();
          settingsMenuToggle.blur();
          setSettingsMenuState(false);
        });

        function setSidebar(state) {
          root.setAttribute('data-sidebar', state);
          localStorage.setItem('opensandbox-sidebar', state);
          updateSidebarLabel();
        }

        var sidebarToggle = document.getElementById('sidebar-toggle');
        if (sidebarToggle) {
          sidebarToggle.addEventListener('click', function () {
            setSidebar(sidebarCollapsed() ? 'expanded' : 'collapsed');
          });
        }

        var workspaceMark = document.getElementById('workspace-mark');
        if (workspaceMark) {
          workspaceMark.addEventListener('click', function () {
            if (sidebarCollapsed()) { setSidebar('expanded'); }
          });
        }

        document.body.addEventListener('keydown', function (event) {
          var action = event.target.closest('[role="button"][data-open-create-modal]');
          if (!action || (event.key !== 'Enter' && event.key !== ' ')) { return; }
          event.preventDefault();
          action.click();
        });
        updateSidebarLabel();
        window.applySandboxFilter();
        window.localizeSandboxTimes();
        window.setInterval(window.localizeSandboxTimes, 30 * 1000);
      });

      document.body.addEventListener('htmx:afterSwap', function () {
        if (window.lucide) { lucide.createIcons(); }
        if (window.applySandboxFilter) { window.applySandboxFilter(); }
        if (window.localizeSandboxTimes) { window.localizeSandboxTimes(); }
      });
    </script>
  </body>
</html>
