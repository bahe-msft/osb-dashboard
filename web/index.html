<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A lightweight dashboard for OpenSandbox">
    <title>OpenSandbox Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/basecoat.cdn.min.css">
    <link rel="stylesheet" href="/assets/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/js/all.min.js" defer></script>
    <script src="https://unpkg.com/htmx.org@2.0.10" defer></script>
  </head>
  <body>
    <aside id="sidebar" class="sidebar" data-side="left">
      <nav aria-label="Primary navigation">
        <header>
          <a class="workspace-switcher" href="/" aria-label="OpenSandbox Dashboard home">
            <span class="workspace-mark" aria-hidden="true">OS</span>
            <span class="workspace-name">OpenSandbox</span>
            <svg class="icon workspace-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="m9 18 6-6-6-6"></path>
            </svg>
          </a>
        </header>

        <section class="scrollbar-sm">
          <div role="group" aria-labelledby="home-navigation">
            <ul>
              <li>
                <a href="/" aria-current="page">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                    <path d="M4 13h6V4H4v9ZM14 20h6v-9h-6v9ZM14 4v3h6V4h-6ZM4 20h6v-3H4v3Z"></path>
                  </svg>
                  <span>Overview</span>
                </a>
              </li>
            </ul>
          </div>

          <div role="group" aria-labelledby="resources-navigation">
            <h3 id="resources-navigation">Resources</h3>
            <ul>
              <li>
                <span aria-disabled="true">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                    <path d="m21 8-9 5-9-5"></path><path d="m3 12 9 5 9-5"></path><path d="m3 4 9 5 9-5-9-3-9 3Z"></path>
                  </svg>
                  <span>Sandboxes</span>
                  <small class="nav-count">—</small>
                </span>
              </li>
              <li>
                <span aria-disabled="true">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                    <path d="M12 2 2 7l10 5 10-5-10-5Z"></path><path d="m2 17 10 5 10-5"></path><path d="m2 12 10 5 10-5"></path>
                  </svg>
                  <span>Snapshots</span>
                </span>
              </li>
            </ul>
          </div>

          <div role="group" aria-labelledby="workspace-navigation">
            <h3 id="workspace-navigation">Workspace</h3>
            <ul>
              <li>
                <span aria-disabled="true">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                    <path d="M3 3v18h18"></path><path d="m7 16 4-5 4 3 4-6"></path>
                  </svg>
                  <span>Activity</span>
                </span>
              </li>
              <li>
                <span aria-disabled="true">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                    <circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1A1.7 1.7 0 0 0 9 4.6 1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1Z"></path>
                  </svg>
                  <span>Settings</span>
                </span>
              </li>
            </ul>
          </div>
        </section>

        <footer>
          <div class="server-status">
            <span class="server-icon">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <rect width="18" height="7" x="3" y="3" rx="2"></rect><rect width="18" height="7" x="3" y="14" rx="2"></rect><path d="M7 6.5h.01M7 17.5h.01"></path>
              </svg>
            </span>
            <span>
              <strong>Local server</strong>
              <small><i></i> Online</small>
            </span>
          </div>
        </footer>
      </nav>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <div class="breadcrumbs">
          <button class="btn mobile-only" data-size="icon-sm" data-variant="ghost" type="button" onclick="document.getElementById('sidebar')?.toggle()" aria-label="Open navigation">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M4 12h16M4 6h16M4 18h16"></path></svg>
          </button>
          <span>OpenSandbox</span>
          <span class="breadcrumb-separator">/</span>
          <strong>Overview</strong>
        </div>
        <div class="topbar-actions">
          <button class="btn search-button" data-size="sm" data-variant="outline" type="button" disabled>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
            Search
            <kbd>⌘ K</kbd>
          </button>
          <button class="btn" data-size="icon-sm" data-variant="ghost" type="button" disabled aria-label="Help">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M9.5 9a2.7 2.7 0 1 1 4.4 2.1c-.9.7-1.9 1.2-1.9 2.4M12 17h.01"></path></svg>
          </button>
        </div>
      </header>

      <main class="page-content">
        <header class="page-heading">
          <div>
            <h1>Overview</h1>
            <p>Monitor your sandbox environment.</p>
          </div>
          <div class="page-actions">
            <button
              class="btn"
              data-size="sm"
              data-variant="outline"
              type="button"
              hx-get="/dashboard/overview"
              hx-target="#overview"
              hx-swap="innerHTML"
              hx-indicator="#overview-loader"
            >
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M20 11a8.1 8.1 0 0 0-15.5-2M4 4v5h5"></path><path d="M4 13a8.1 8.1 0 0 0 15.5 2M20 20v-5h-5"></path></svg>
              <span class="desktop-only">Refresh</span>
              <span id="overview-loader" class="htmx-indicator">·</span>
            </button>
            <button class="btn" data-size="sm" type="button" disabled title="OpenSandbox API configuration is not available yet">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
              <span class="desktop-only">New sandbox</span>
            </button>
          </div>
        </header>

        <section
          id="overview"
          hx-get="/dashboard/overview"
          hx-trigger="load, every 30s"
          hx-swap="innerHTML"
          hx-indicator="#overview-loader"
          aria-live="polite"
        >
          <div class="summary-grid" aria-label="Loading dashboard">
            <div class="skeleton summary-skeleton"></div>
            <div class="skeleton summary-skeleton"></div>
            <div class="skeleton summary-skeleton"></div>
            <div class="skeleton summary-skeleton"></div>
          </div>
        </section>

        <noscript>
          <div class="api-notice"><span></span><strong>JavaScript required.</strong> Enable it for live updates.</div>
        </noscript>
      </main>
    </div>
  </body>
</html>
