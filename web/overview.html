<div class="filter-tabs" aria-label="Sandbox status">
  <span class="filter-pill" data-active="true">All <span class="count">&nbsp;{{.Total}}</span></span>
  {{range .StateCounts}}
    <span class="filter-pill">{{.State}} <span class="count">&nbsp;{{.Count}}</span></span>
  {{end}}
</div>

<div class="state-groups">
  {{range .Groups}}
    <section class="sandbox-group" aria-labelledby="sandbox-group-{{.State}}-title">
      <input class="group-toggle" id="sandbox-group-{{.State}}-toggle" type="checkbox" checked>
      <label for="sandbox-group-{{.State}}-toggle">
        <span class="group-header">
          <span class="group-title" id="sandbox-group-{{.State}}-title">
            <span class="chevron" aria-hidden="true"><i data-lucide="chevron-down"></i></span>
            <strong>{{.Label}}</strong>
            <span class="count">{{len .Sandboxes}}</span>
          </span>
        </span>
      </label>

      <div class="sandbox-list">
        {{range .Sandboxes}}
          <article class="sandbox-row">
            <span class="status-ring" data-status="{{.State}}" aria-hidden="true"></span>
            <div class="sandbox-headline">
              <span class="sandbox-name">{{.Name}}</span>
            </div>
            <span class="sandbox-updated">{{.Detail}}</span>
            {{if .Metadata}}<span class="chip">{{.Metadata}}</span>{{end}}
          </article>
        {{end}}
      </div>
    </section>
  {{else}}
    <div class="empty-state" role="button" tabindex="0" aria-labelledby="empty-state-title" title="Deploy a new sandbox">
      <span class="empty-state-icon" aria-hidden="true"><i data-lucide="box"></i></span>
      <h2 id="empty-state-title">Deploy a new sandbox</h2>
      <p>Start an isolated workload in this cluster.</p>
    </div>
  {{end}}
</div>
