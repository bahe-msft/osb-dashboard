<div class="filter-tabs" aria-label="Sandbox status">
  <span class="filter-pill" data-active="true">All <span class="count">&nbsp;—</span></span>
  <span class="filter-pill">running <span class="count">&nbsp;—</span></span>
  <span class="filter-pill">paused <span class="count">&nbsp;—</span></span>
  <span class="filter-pill">failed <span class="count">&nbsp;—</span></span>
</div>

<div class="connection-notice" role="status">
  <span class="status-ring" data-status="pending" aria-hidden="true"></span>
  <div class="connection-copy">
    <strong>OpenSandbox API not configured</strong>
    <span>Sandbox data will appear after a backend connection is added.</span>
  </div>
  <span class="chip">local</span>
</div>

<section class="sandbox-group" aria-labelledby="sandbox-group-title">
  <input class="group-toggle" id="sandbox-group-toggle" type="checkbox" checked>
  <label for="sandbox-group-toggle">
    <span class="group-header">
      <span class="group-title" id="sandbox-group-title">
        <span class="chevron" aria-hidden="true"><i data-lucide="chevron-down"></i></span>
        <strong>Sandboxes</strong>
        <span class="count">0</span>
      </span>
    </span>
  </label>

  <div class="sandbox-list">
    <article class="sandbox-row empty-row">
      <span class="status-ring" aria-hidden="true"></span>
      <div class="sandbox-headline">
        <span class="sandbox-name">No sandboxes yet</span>
      </div>
      <span class="sandbox-updated">Connect the OpenSandbox API to see your resources.</span>
      <span class="chip">api=not-configured</span>
    </article>
  </div>
</section>
